name: VULPECULA CURRIT

# Run once a day + allow manual runs.
on:
  schedule:
    - cron: '0 0 * * *'   # daily at 00:00 UTC
  workflow_dispatch:

# Allow the workflow to push README + cache updates using GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    env:
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Report token presence
        run: |
          echo "GH_PAT present? ${GH_PAT:+yes}"
          python -c "import os; print('GH_PAT length:', len(os.getenv('GH_PAT') or ''))"

      - name: Render README
        run: python scripts/update_readme.py

      - name: Run tests (after rendering)
        run: pytest -q

      - name: Commit & push changes (if any)
        run: |
          if [ -n "$(git status --porcelain README.md .activity_cache.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md .activity_cache.json
            git commit -m "chore(readme): daily automated update"
            git push
          else
            echo "No changes to commit"
          fi
